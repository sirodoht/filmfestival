<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Heartfort Flash Film Festival{% endblock %}</title>
    <link href="https://fonts.bunny.net/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Cinzel', serif;
            font-weight: 400;
            background: #0a0a0a;
            color: #e8e6e3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 3rem;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .nav {
                padding: 1.5rem 1.5rem;
            }
        }

        .nav-logo {
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            color: #e8e6e3;
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        @media (max-width: 768px) {
            .nav-links {
                gap: 1.5rem;
            }
        }

        .nav-link {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            color: #c9a962;
            text-decoration: none;
            text-transform: uppercase;
            transition: opacity 0.3s ease;
        }

        .nav-link:hover {
            opacity: 0.7;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 2rem;
        }
        @media (max-width: 768px) {
            .hero {
                padding: 5rem 1.5rem;
            }
        }

        .hero-tagline {
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            color: #c9a962;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .hero-title {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 400;
            letter-spacing: 0.08em;
            color: #f5f3f0;
            line-height: 1.1;
            margin-bottom: 1rem;
            margin-top: 0;
            text-transform: uppercase;
        }

        .hero-subtitle {
            font-size: clamp(0.9rem, 2vw, 1.8rem);
            letter-spacing: 0.35em;
            color: #9a958f;
            text-transform: uppercase;
            margin-top: 1rem;
            margin-bottom: 2.5rem;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: #8a8580;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .hero-meta {
                flex-direction: column;
                gap: 0.5rem;
            }
        }

        .hero-meta-divider {
            width: 2rem;
            height: 1px;
            background: rgba(138, 133, 128, 0.4);
        }
        @media (max-width: 768px) {
            .hero-meta-divider {
                width: 1.5rem;
                height: 1px;
            }
        }

        .hero-indicator {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: #c9a962;
            text-transform: uppercase;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
            text-align: center;
        }
        @media (max-width: 768px) {
            .container {
                padding: 6rem 1.5rem 3rem;
            }
        }

        .festival-name {
            font-size: clamp(2rem, 6vw, 4rem);
            color: #c9a962;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
        }

        .logo-line-1 {
            display: block;
        }

        .flash {
            font-style: italic;
            letter-spacing: 0.1em;
            color: #c9a962;
        }

        .film-festival {
            letter-spacing: 0.08em;
            color: #f5f3f0;
        }

        .logo-line-2 {
            display: block;
            font-size: 0.6em;
            letter-spacing: 0.25em;
            margin-top: 0.3rem;
        }

        .tagline {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            letter-spacing: 0.15em;
            color: #7a7269;
            margin-bottom: 3rem;
        }

        .open-call {
            border-top: 1px solid rgba(201, 169, 98, 0.3);
            border-bottom: 1px solid rgba(201, 169, 98, 0.3);
            padding: 2rem 0;
            margin: 2rem 0;
        }

        .theme {
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: #c9a962;
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .theme-label {
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            color: #7a7269;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .duration {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            color: #8a8580;
            margin-bottom: 2rem;
        }

        .dates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .date-block {
            padding: 1.5rem;
        }

        .date-label {
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            color: #7a7269;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .date-value {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: #c9a962;
            letter-spacing: 0.05em;
        }

        .venue {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(201, 169, 98, 0.2);
        }

        .venue-name {
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            color: #e8e6e3;
            letter-spacing: 0.1em;
        }

        .venue-location {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            color: #7a7269;
            margin-top: 0.5rem;
        }

        .cta {
            margin-top: 3rem;
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 3rem;
            border: 1px solid #c9a962;
            color: #c9a962;
            text-decoration: none;
            letter-spacing: 0.2em;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .cta-button:hover {
            background: #c9a962;
            color: #0a0a0a;
        }

        /* Theme Section */
        .theme-section {
            margin-top: 0;
            padding: 8rem 0;
            text-align: center;
            width: 100%;
            background: linear-gradient(180deg, #0f0f0f 0%, #0a0a0a 100%);
            border-bottom: 1px solid rgba(201, 169, 98, 0.15);
            border-top: 1px solid rgba(201, 169, 98, 0.1);
        }

        .theme-section-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 3rem;
        }

        @media (max-width: 768px) {
            .theme-section-inner {
                padding: 0 1.5rem;
            }
        }

        .theme-section-title {
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            color: #c9a962;
            text-transform: uppercase;
            margin-bottom: 3rem;
            font-weight: 400;
            text-align: left;
        }

        .theme-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .theme-word {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 400;
            letter-spacing: 0.2em;
            color: #f5f3f0;
            text-transform: uppercase;
            line-height: 1;
        }

        @media (max-width: 768px) {
            .theme-word {
                font-size: clamp(3rem, 12vw, 8rem);
            }
        }

        .theme-icon {
            font-size: 2rem;
            color: #c9a962;
            opacity: 0.7;
            margin-top: -0.5rem;
            position: absolute;
        }

        .theme-icon-main {
            opacity: 0.8;
            z-index: 3;
            animation: paw-fade 3s ease-in-out infinite;
        }

        .theme-icon-trail-1 {
            opacity: 0;
            transform: translateX(-35px);
            z-index: 2;
            animation: paw-trail-1 3s ease-in-out infinite;
        }

        .theme-icon-trail-2 {
            opacity: 0;
            transform: translateX(-70px);
            z-index: 1;
            animation: paw-trail-2 3s ease-in-out infinite;
        }

        .theme-icon-trail-3 {
            opacity: 0;
            transform: translateX(-105px);
            z-index: 0;
            animation: paw-trail-3 3s ease-in-out infinite;
        }

        @keyframes paw-fade {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.5; }
        }

        @keyframes paw-trail-1 {
            0%, 20% { opacity: 0; }
            30% { opacity: 0.4; }
            70% { opacity: 0.4; }
            80%, 100% { opacity: 0; }
        }

        @keyframes paw-trail-2 {
            0%, 35% { opacity: 0; }
            45% { opacity: 0.25; }
            65% { opacity: 0.25; }
            75%, 100% { opacity: 0; }
        }

        @keyframes paw-trail-3 {
            0%, 50% { opacity: 0; }
            55% { opacity: 0.15; }
            60% { opacity: 0.15; }
            65%, 100% { opacity: 0; }
        }

        @media (max-width: 768px) {
            .theme-icon {
                font-size: 1.5rem;
            }

            .theme-icon-trail-1 {
                transform: translateX(-28px);
            }

            .theme-icon-trail-2 {
                transform: translateX(-56px);
            }

            .theme-icon-trail-3 {
                transform: translateX(-84px);
            }
        }

        .theme-icon-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 3rem;
            min-width: 300px;
        }

        .theme-description {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            line-height: 1.9;
            color: #999;
            max-width: 600px;
            margin: 0;
        }

        @media (max-width: 768px) {
            .theme-section {
                padding: 5rem 0;
            }
        }

        /* Festival Info Section */
        .festival-info {
            margin-top: 0;
            padding: 8rem 0;
            text-align: left;
            width: 100%;
            background: #0a0a0a;
        }

        .festival-info-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 3rem;
        }

        @media (max-width: 768px) {
            .festival-info-inner {
                padding: 0 1.5rem;
            }
        }

        .festival-info-title {
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            color: #c9a962;
            text-transform: uppercase;
            margin-bottom: 3rem;
            font-weight: 400;
        }

        .festival-info-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }
        @media (max-width: 768px) {
            .festival-info-content {
                grid-template-columns: 1fr;
                gap: 3rem;
            }
        }

        .festival-info-text p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            line-height: 1.9;
            color: #999;
            margin-bottom: 1.5rem;
        }

        .festival-stats {
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(5rem, 12vw, 8rem);
            color: #e8e6e3;
            line-height: 1;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .stat-label {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            color: #888;
            text-transform: uppercase;
        }

        .stat-timer {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .timer-ring {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        @media (max-width: 768px) {
            .timer-ring {
                width: 240px;
                height: 240px;
            }
        }

        .timer-ring::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 1px solid rgba(201, 169, 98, 0.3);
            border-radius: 50%;
        }

        .timer-ring::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border: 1px solid rgba(201, 169, 98, 0.1);
            border-radius: 50%;
        }

        .stat-timer .stat-number {
            font-size: clamp(6rem, 14vw, 10rem);
            margin-bottom: 0.5rem;
            font-weight: 300;
            transform: translateY(-36px);
        }
        @media (max-width: 768px) {
            .stat-timer .stat-number {
                font-size: clamp(5rem, 12vw, 8rem);
            }
        }

        .stat-timer .stat-label {
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            color: #c9a962;
        }

        @media (max-width: 768px) {
            .festival-info {
                padding: 5rem 0;
            }
        }

        /* Important Dates Section */
        .important-dates-section {
            margin-top: 6rem;
            padding: 4rem 0;
            border-top: 1px solid rgba(201, 169, 98, 0.15);
            text-align: left;
            width: 100%;
        }
        @media (max-width: 768px) {
            .important-dates-section {
                margin-top: 4rem;
                padding: 3rem 0;
            }
        }

        .important-dates-inner {
            max-width: 350px;
            margin: 0 auto;
            padding: 0 3rem;
        }
        @media (max-width: 768px) {
            .important-dates-inner {
                padding: 0 1.5rem;
            }
        }

        .important-dates-label {
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            color: #c9a962;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            opacity: 0.9;
        }
        @media (max-width: 768px) {
            .important-dates-label {
                margin-bottom: 2rem;
            }
        }

        .timeline {
            position: relative;
            padding-left: 2rem;
        }
        @media (max-width: 768px) {
            .timeline {
                padding-left: 1.25rem;
            }
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.5rem;
            bottom: 0.5rem;
            width: 1px;
            background: rgba(201, 169, 98, 0.25);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 2.5rem;
        }
        @media (max-width: 768px) {
            .timeline-item {
                padding-bottom: 2rem;
            }
        }

        .timeline-item:last-child {
            padding-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: -2.2rem;
            top: 0.35rem;
            width: 7px;
            height: 7px;
            background: #c9a962;
            border-radius: 50%;
            opacity: 0.8;
        }
        @media (max-width: 768px) {
            .timeline-dot {
                left: -1.6rem;
                top: 0.4rem;
                width: 6px;
                height: 6px;
            }
        }

        .timeline-date {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: #c9a962;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .timeline-title {
            font-size: 0.95rem;
            color: #e8e6e3;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        @media (max-width: 768px) {
            .timeline-title {
                font-size: 0.9rem;
            }
        }

        .timeline-description {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.8rem;
            color: #7a7269;
            letter-spacing: 0.03em;
            text-transform: none;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .timeline-description {
                font-size: 0.75rem;
            }
        }

        /* Submissions Section */
        .submissions-section {
            text-align: center;
            background: #141414;
        }
        @media (max-width: 768px) {
            .submissions-section {
                margin: 2rem 1rem;
            }
        }

        .submissions-inner {
            margin: 2rem 2rem;
            border: 1px solid rgba(201, 169, 98, 0.25);
        }

        .submissions-content {
            max-width: 700px;
            margin: 0 auto;
            padding: 20rem 2rem;
        }
        @media (max-width: 768px) {
            .submissions-content {
                padding: 5rem 1.5rem;
            }
        }

        .submissions-label {
            font-size: 0.65rem;
            letter-spacing: 0.35em;
            color: #c9a962;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .submissions-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: #f5f3f0;
            letter-spacing: 0.05em;
            font-weight: 400;
            margin: 0 0 1.5rem 0;
            line-height: 1.2;
        }

        .submissions-description {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            line-height: 1.7;
            color: #8a8580;
            max-width: 550px;
            margin: 0 auto 2.5rem;
        }

        @media (max-width: 768px) {
            .submissions-description {
                font-size: 1rem;
            }
        }

        .submissions-button {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.2rem 2.5rem;
            background: #f5f3f0;
            color: #0a0a0a;
            text-decoration: none;
            letter-spacing: 0.15em;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .submissions-button:hover {
            background: #c9a962;
            color: #0a0a0a;
        }

        .submissions-arrow {
            transition: transform 0.3s ease;
        }

        .submissions-button:hover .submissions-arrow {
            transform: translateX(4px);
        }

        /* FAQ Section */
        .faq-section {
            margin-top: 3rem;
            padding: 2rem 0;
            border-top: 1px solid rgba(201, 169, 98, 0.15);
            text-align: left;
            width: 100%;
        }

        .faq-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 3rem;
        }

        @media (max-width: 768px) {
            .faq-inner {
                padding: 0 1.5rem;
            }
        }

        .faq-header {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .faq-number {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            color: #c9a962;
            opacity: 0.9;
        }

        .faq-title {
            font-size: clamp(2rem, 5vw, 3rem);
            color: #e8e6e3;
            letter-spacing: 0.05em;
            font-weight: 400;
            margin: 0;
        }

        .faq-list {
            display: flex;
            flex-direction: column;
        }

        .faq-item {
            border-bottom: 1px solid rgba(201, 169, 98, 0.15);
        }

        .faq-question {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .faq-question:hover {
            opacity: 0.8;
        }

        .faq-question-text {
            font-size: 1rem;
            color: #e8e6e3;
            letter-spacing: 0.02em;
            margin: 0;
            font-weight: 400;
        }

        @media (max-width: 768px) {
            .faq-question-text {
                font-size: 0.9rem;
            }
        }

        .faq-icon {
            width: 16px;
            height: 16px;
            position: relative;
            flex-shrink: 0;
            margin-left: 1rem;
        }

        .faq-icon::before,
        .faq-icon::after {
            content: '';
            position: absolute;
            background: #c9a962;
            transition: transform 0.1s ease;
        }

        .faq-icon::before {
            width: 100%;
            height: 1px;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        .faq-icon::after {
            width: 1px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }

        .faq-item.active .faq-icon::after {
            transform: translateX(-50%) rotate(90deg);
        }

        .faq-answer {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease;
        }

        .faq-item.active .faq-answer {
            grid-template-rows: 1fr;
            padding-bottom: 1.5rem;
        }

        .faq-answer-inner {
            overflow: hidden;
        }

        .faq-answer-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.9rem;
            color: #7a7269;
            line-height: 1.6;
            margin: 0;
        }
        @media (max-width: 768px) {
            .faq-answer-text {
                font-size: 0.85rem;
            }
        }

        /* Footer */
        .footer {
            width: 100%;
            background: #141414;
            padding: 3rem 0;
            border-top: 1px solid rgba(201, 169, 98, 0.15);
        }
        @media (max-width: 768px) {
            .footer {
                padding: 2rem 0;
            }
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
